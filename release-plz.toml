# release-plz config
# https://release-plz.ieni.dev/docs/config

[workspace]
changelog_update = true
git_release_enable = true
git_tag_enable = true
publish_allow_dirty = false
release_always = false
# The auto-generated api crate changes frequently and doesn't need per-spec
# releases; we release it alongside the rest on a normal cadence.
semver_check = true

# We publish every workspace crate together. release-plz walks the dep
# graph so `bezant-spec` + `bezant-api` (the generated pair) ship before
# the consumers that depend on them.
