[book]
title = "bezant — IBKR Client Portal Web API for Rust (and friends)"
authors = ["Isaac Rowntree"]
description = "Docs for the bezant suite: Rust crates, HTTP sidecar, CLI, MCP server, TypeScript client."
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
git-repository-url = "https://github.com/isaacrowntree/bezant"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/isaacrowntree/bezant/edit/main/docs/{path}"
default-theme = "light"
preferred-dark-theme = "ayu"
smart-punctuation = true

[output.html.playground]
editable = false
copyable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
