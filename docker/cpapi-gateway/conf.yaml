    ip2loc: "US"
    proxyRemoteSsl: true
    proxyRemoteHost: "https://api.ibkr.com"
    listenPort: 5000
    listenSsl: true
    ccp: false
    svcEnvironment: "v1"
    sslCert: "vertx.jks"
    sslPwd: "mywebapi"
    authDelay: 3000
    portalBaseURL: ""
    serverOptions:
        blockedThreadCheckInterval: 1000000
        eventLoopPoolSize: 20
        workerPoolSize: 20
        maxWorkerExecuteTime: 100
        internalBlockingPoolSize: 20
    cors:
        origin.allowed: "*"
        allowCredentials: false
    webApps:
        - name: "demo"
          index: "index.html"
    # Widened from the default `127.0.0.1 / 192.* / 131.216.*` so the
    # container is reachable behind a reverse proxy (Railway TCP proxy,
    # Cloud Run, k8s ingress). Don't expose port 5000 to the open
    # internet without auth in front of it — the Gateway doesn't do any
    # request-level authentication itself; it relies on the network
    # boundary.
    ips:
      allow:
        - "*"
        - 127.0.0.1
      deny: []
