name: Release

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "release-plz.toml"
  workflow_dispatch:

concurrency:
  group: release-plz-${{ github.ref }}

jobs:
  release-plz:
    name: release-plz
    if: github.repository == 'isaacrowntree/bezant'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || github.token }}
          # Provide CARGO_REGISTRY_TOKEN as a repo secret once we're ready
          # to publish automatically to crates.io.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
