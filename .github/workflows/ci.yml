name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (hand-written crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo clippy \
            -p bezant-core -p bezant-spec -p bezant-server \
            -p bezant-cli -p bezant-mcp \
            --all-targets \
            -- -D warnings

  test:
    name: test (${{ matrix.toolchain }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: beta
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  # Verify the workspace still builds on the MSRV we advertise in
  # workspace Cargo.toml (`rust-version = "1.89"`). `RUSTUP_TOOLCHAIN`
  # overrides the repo's rust-toolchain.toml for the duration of the job.
  msrv:
    name: msrv check (rust 1.89)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.89"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  typescript:
    name: typescript client build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: clients/typescript
        run: |
          npm install
          npm run build

  # Catches broken intra-doc links + bad rustdoc syntax pre-merge so a
  # docs-build regression doesn't land on main.
  docs:
    name: doc build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo doc --workspace --no-deps \
            -p bezant-core -p bezant-server -p bezant-cli \
            -p bezant-mcp -p bezant-spec

  # Smoke-test that each crate would `cargo publish` cleanly. Catches
  # missing LICENSE files in the per-crate dir, missing README, broken
  # `[package.metadata]`, etc — would otherwise only surface as a real
  # publish failure.
  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          set -euo pipefail
          # Order matters: bezant-spec → bezant-api → bezant-core →
          # bezant-server / bezant-cli / bezant-mcp. cargo publish
          # --dry-run still resolves path deps, so this respects the
          # graph automatically.
          for c in bezant-spec bezant-api bezant-core bezant-server bezant-cli bezant-mcp; do
            echo "::group::$c"
            cargo publish -p "$c" --dry-run --allow-dirty --no-verify
            echo "::endgroup::"
          done
