name: Docker

# Per-arch builds run on their native runner (no QEMU), then a merge job
# stitches them into a single multi-arch manifest. Cuts wall time from
# ~20min (QEMU-emulated arm64 cargo build) to ~5min (native arm64).
#
# Pattern adapted from
# https://docs.docker.com/build/ci/github-actions/multi-platform/
# #distribute-build-across-multiple-runners.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: bezant-server
            context: .
            dockerfile: Dockerfile
            repo: isaacrowntree/bezant-server
          - name: cpapi-gateway
            context: docker/cpapi-gateway
            dockerfile: docker/cpapi-gateway/Dockerfile
            repo: isaacrowntree/cpapi-gateway
          - name: bezant-combined
            context: .
            dockerfile: docker/combined/Dockerfile
            repo: isaacrowntree/bezant-combined
        platform:
          - linux/amd64
          - linux/arm64
        include:
          # Pin each arch to its native GitHub-hosted runner. `ubuntu-24.04-arm`
          # has been GA for public repos since 2024-09 and private since
          # 2025; using it sidesteps QEMU and roughly halves arm64 build
          # times for cargo-heavy images.
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image fields
        id: img
        # The matrix entry above leaves `name`/`context`/etc. empty; pull
        # the real values out of `matrix.image` here so subsequent steps
        # can reference them as plain `${{ steps.img.outputs.* }}`.
        run: |
          echo "name=${{ matrix.image.name }}" >> "$GITHUB_OUTPUT"
          echo "context=${{ matrix.image.context }}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${{ matrix.image.dockerfile }}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ matrix.image.repo }}" >> "$GITHUB_OUTPUT"
          # Sanitize platform for use in artifact names (slash → dash).
          echo "platform_pair=${{ matrix.platform }}" | sed 's|/|-|g' >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.repo }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.img.outputs.context }}
          file: ${{ steps.img.outputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Push by digest only — the merge job below stitches digests
          # from each arch into the final tagged manifest.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.img.outputs.repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.img.outputs.name }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ steps.img.outputs.name }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ steps.img.outputs.name }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ steps.img.outputs.name }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.img.outputs.name }}-${{ steps.img.outputs.platform_pair }}
          path: /tmp/digests/${{ steps.img.outputs.name }}/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.name }} multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bezant-server
            repo: isaacrowntree/bezant-server
          - name: cpapi-gateway
            repo: isaacrowntree/cpapi-gateway
          - name: bezant-combined
            repo: isaacrowntree/bezant-combined
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.repo }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create + push manifest
        # buildx imagetools create stitches per-arch digests into a
        # single multi-arch manifest, applying every requested tag to it
        # in one call. This is the supported way to handle the
        # split-build-then-merge flow.
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest_refs=$(printf '${{ env.REGISTRY }}/${{ matrix.repo }}@sha256:%s ' *)
          docker buildx imagetools create $tags $digest_refs

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ matrix.repo }}:${{ steps.meta.outputs.version }}"
