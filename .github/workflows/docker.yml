name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-server

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build + push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bezant-server
            context: .
            dockerfile: Dockerfile
            image: isaacrowntree/bezant-server
          - name: cpapi-gateway
            context: docker/cpapi-gateway
            dockerfile: docker/cpapi-gateway/Dockerfile
            image: isaacrowntree/cpapi-gateway
          - name: bezant-combined
            context: .
            dockerfile: docker/combined/Dockerfile
            image: isaacrowntree/bezant-combined
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        # Cross-arch emulation so amd64 runners can build arm64 layers.
        # Required for Pi (arm64) and other non-x86 targets to pull this
        # image without "exec format error".
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
