version: 2

updates:
  # Rust workspace crates
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    groups:
      rmcp:
        patterns:
          - "rmcp*"
      axum-tower:
        patterns:
          - "axum*"
          - "tower*"
          - "tower-http*"
          - "hyper*"
      progenitor-typify:
        patterns:
          - "progenitor*"
          - "typify*"
          - "openapiv3*"

  # TypeScript client
  - package-ecosystem: "npm"
    directory: "/clients/typescript"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "typescript"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
